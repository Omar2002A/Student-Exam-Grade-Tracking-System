<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/css/style.css">
    <title>Login — ExamTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background:var(--color-bg);">

    <nav class="navbar site-navbar py-3">
        <div class="container-narrow">
            <a class="navbar-brand" href="index.html"><img class="logo" src="assets/images/logo.png" alt=""></a>
        </div>
    </nav>

    <main class="d-flex align-items-center justify-content-center py-5" style="min-height: calc(100vh - 90px);">
        <div class="login-shell">

            <div class="login-form-side">
                <h1 class="h2 mb-2" style="font-weight:700;">Welcome back</h1>
                <p class="mb-4">Please enter your details to access your dashboard.</p>

                <form id="loginForm" novalidate>
                    <label class="form-label small fw-bold mb-2">I am a...</label>
                    <div class="role-toggle mb-4">
                        <div class="role-option active" id="roleStudentBtn">
                            <img class="role-icon-img" src="assets/images/login-hat.png"  alt="">
                            <span class="d-block mt-2">Student</span>
                        </div>
                        <div class="role-option" id="roleTeacherBtn">
                            <img class="role-icon-img" src="assets/images/login-teacher.png" alt="">
                            <span class="d-block mt-2">Teacher</span>
                        </div>
                    </div>
                    <input type="hidden" id="selectedRole" value="Student">

                    <div class="mb-3">
                        <label for="username" class="form-label small fw-bold">Username</label>
                        <div class="input-with-icon">
                            <img class="input-icon" src="assets/images/login-email.png" alt="">
                            <input type="text" id="username" class="form-control-paper" placeholder="your.username" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label small fw-bold">Password</label>
                        <div class="input-with-icon">
                            <img class="input-icon" src="assets/images/login-pass.png" alt="">
                            <input type="password" id="password" class="form-control-paper" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="form-check mb-4">
                        <input class="form-check-input" type="checkbox" id="keepLoggedIn">
                        <label class="form-check-label small" for="keepLoggedIn">Keep me logged in</label>
                    </div>

                    <div id="errorMsg" class="small mb-3" style="color: var(--color-fail); display: none;"></div>

                    <button type="submit" class="btn-ink w-100">Login to ExamTrack →</button>
                    <p class="text-center small mt-3 mb-0">Don't have an account? <a href="mailto:abdalkrem.business@gmail.com">Contact your administrator</a></p>
                </form>
            </div>

            <div class="login-banner-side">
                <img src="assets/images/login.png"class="login-banner-img">
                    
                <div style="position:relative; z-index:1;">
                    <h2 class="h3 mb-2" style="color:var(--color-text);">Track Your Academic Excellence</h2>
                    <p class="mb-0" style="color:var(--color-text-soft);">
                        Join thousands of students and teachers using ExamTrack to manage results, monitor progress, and achieve academic goals.
                    </p>
                </div>
            </div>

        </div>
    </main>

    <script src="js/core/storage.js"></script>
    <script src="js/core/seed.js"></script>
    <script src="js/core/auth.js"></script>

    <script>
        redirectIfLoggedIn();

        const teacherBtn = document.getElementById("roleTeacherBtn");
        const studentBtn = document.getElementById("roleStudentBtn");
        const selectedRole = document.getElementById("selectedRole");

        function setRole(role) {
            selectedRole.value = role;
            teacherBtn.classList.toggle("active", role === "Teacher");
            studentBtn.classList.toggle("active", role === "Student");
        }
        teacherBtn.addEventListener("click", () => setRole("Teacher"));
        studentBtn.addEventListener("click", () => setRole("Student"));

  
        document.getElementById("loginForm").addEventListener("submit", function (e) {
            e.preventDefault();
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const errorMsg = document.getElementById("errorMsg");
            const result = login(username, password);

            if (!result.success) {
                errorMsg.textContent = result.message;
                errorMsg.style.display = "block";
                return;
            }
            if (result.user.role !== selectedRole.value) {
                clearSession();
                errorMsg.textContent = `This account is not registered as a ${selectedRole.value}.`;
                errorMsg.style.display = "block";
                return;
            }
            redirectToDashboard(result.user);
        });
    </script>
</body>
</html>
